---
- name: Installation Nextcloud (base distante, sans restauration)
  hosts: nextcloud
  become: yes

  vars:
    db_host: "{{ lookup('env', 'NC_DB_HOST') }}"
    db_name: "{{ lookup('env', 'NC_DB_NAME') }}"
    db_user: "{{ lookup('env', 'NC_DB_USER') }}"
    db_password: "{{ lookup('env', 'NC_DB_PASSWORD') }}"
    admin_user: "{{ lookup('env', 'NC_ADMIN_USER') }}"
    admin_password: "{{ lookup('env', 'NC_ADMIN_PASSWORD') }}"
    ncpa_token: "{{ lookup('env', 'NC_NCPA_TOKEN') }}"

  tasks:
    # --- Configuration Système & SSH ---
    - name: Autoriser le login root
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin yes'

    - name: Redémarrer SSH
      systemd:
        name: ssh
        state: restarted
        enabled: yes

    # --- Installation PHP 8.2 & Apache ---
    - name: Installer les prérequis pour le PPA
      apt:
        name: [software-properties-common, ca-certificates, lsb-release, apt-transport-https]
        update_cache: yes

    - name: Ajouter le PPA PHP (Ondřej Surý)
      apt_repository:
        repo: "ppa:ondrej/php"
        state: present

    - name: Installer Apache et les modules PHP 8.2
      apt:
        name:
          - apache2
          - libapache2-mod-php8.2
          - php8.2
          - php8.2-gd
          - php8.2-mysql
          - php8.2-curl
          - php8.2-mbstring
          - php8.2-intl
          - php8.2-gmp
          - php8.2-bcmath
          - php8.2-xml
          - php8.2-imagick
          - php8.2-zip
          - unzip
          - wget
          - python3-pymysql
          - mariadb-client
        update_cache: yes

    - name: Activer PHP 8.2 pour Apache
      shell: |
        a2dismod php8.1 2>/dev/null || true
        a2enmod php8.2
      ignore_errors: yes

    # --- Déploiement du code Nextcloud ---
    - name: Télécharger Nextcloud
      get_url:
        url: https://download.nextcloud.com/server/releases/latest.zip
        dest: /tmp/nextcloud.zip

    - name: Décompresser Nextcloud
      shell: unzip -o -q /tmp/nextcloud.zip -d /var/www/
      args:
        creates: /var/www/nextcloud

    - name: Créer le dossier data de stockage physique
      file:
        path: /var/www/nextcloud/data
        state: directory
        owner: www-data
        group: www-data
        mode: '0770'

    # --- Configuration Réseau Apache ---
    - name: Créer le vhost Apache
      copy:
        dest: /etc/apache2/sites-available/nextcloud.conf
        content: |
          <VirtualHost *:80>
            DocumentRoot /var/www/nextcloud
            <Directory /var/www/nextcloud>
              Require all granted
              AllowOverride All
              Options FollowSymLinks MultiViews
            </Directory>
          </VirtualHost>

    - name: Activer le site Nextcloud
      shell: |
        a2ensite nextcloud.conf
        a2enmod rewrite headers env dir mime
        a2dissite 000-default.conf
      ignore_errors: yes

    - name: Redémarrer Apache
      systemd:
        name: apache2
        state: restarted

    # --- Permissions AVANT l'install (crucial : sinon "Cannot write config") ---
    - name: Appliquer les permissions www-data avant install
      file:
        path: /var/www/nextcloud
        owner: www-data
        group: www-data
        recurse: yes

    # --- Installation Nextcloud (base vierge + config.php valide) ---
    - name: Vérifier si Nextcloud est déjà installé
      become_user: www-data
      shell: |
        php /var/www/nextcloud/occ status 2>/dev/null | grep -q 'installed: true'
      register: nc_installed
      failed_when: false
      changed_when: false

    - name: Initialiser Nextcloud via occ (installation de base)
      become_user: www-data
      shell: |
        php /var/www/nextcloud/occ maintenance:install \
          --database "mysql" \
          --database-host "{{ db_host }}" \
          --database-name "{{ db_name }}" \
          --database-user "{{ db_user }}" \
          --database-pass "{{ db_password }}" \
          --admin-user "{{ admin_user }}" \
          --admin-pass "{{ admin_password }}"
      when: nc_installed.rc != 0
      register: install_result

    - name: Afficher le résultat de l'installation
      debug:
        var: install_result.stdout_lines
      when: install_result is defined and install_result.stdout_lines is defined

    # --- Finalisation ---
    - name: Appliquer les permissions www-data sur l'ensemble du dossier
      file:
        path: /var/www/nextcloud
        owner: www-data
        group: www-data
        recurse: yes

    - name: Assurer l'autorisation de l'IP du VLAN40 (trusted domains)
      become_user: www-data
      shell: |
        php /var/www/nextcloud/occ config:system:set trusted_domains 0 --value="192.168.40.50"
      ignore_errors: yes

    # === Agent NCPA (supervision par Nagios) ===
    - name: Télécharger NCPA
      get_url:
        url: "https://assets.nagios.com/downloads/ncpa3/ncpa-latest-1.amd64.deb"
        dest: /tmp/ncpa.deb

    - name: Installer NCPA
      apt:
        deb: /tmp/ncpa.deb

    - name: Configurer le token NCPA (section api)
      community.general.ini_file:
        path: /usr/local/ncpa/etc/ncpa.cfg
        section: api
        option: community_string
        value: "{{ ncpa_token }}"
        no_extra_spaces: yes
      notify: restart ncpa

    - name: Démarrer et activer NCPA
      systemd:
        name: ncpa
        state: started
        enabled: yes

  handlers:
    - name: restart ncpa
      systemd:
        name: ncpa
        state: restarted
