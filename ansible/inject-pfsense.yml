---
- name: Injection de la configuration pfSense complète
  hosts: pfsense
  gather_facts: no

  tasks:
    - name: Copier le config.xml complet vers pfSense
      copy:
        src: files/config-pfsense.xml
        dest: /cf/conf/config.xml
        owner: root
        group: wheel
        mode: '0644'

    - name: Redémarrer pfSense pour appliquer la config
      shell: /etc/rc.reboot
      async: 1
      poll: 0
      ignore_errors: yes
