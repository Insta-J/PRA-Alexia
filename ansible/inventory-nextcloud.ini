[nextcloud]
nextcloud-lxc

[nextcloud:vars]
ansible_connection=community.proxmox.proxmox_pct_remote
ansible_host={{ lookup('env', 'PROXMOX_HOST') }}
ansible_user=terraform
ansible_password={{ lookup('env', 'PROXMOX_SSH_PASSWORD') }}
proxmox_vmid={{ lookup('env', 'NEXTCLOUD_VMID') }}
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
